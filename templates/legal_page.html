{% extends "base.html" %}

{% block content %}
<article class="section legal-article detail-panel">
  <div class="eyebrow">صفحة قانونية</div>
  <h1>{{ page.title }}</h1>
  {% if page.summary %}<p class="muted">{{ page.summary }}</p>{% endif %}
  <div class="legal-content">{{ page.content|linebreaks }}</div>
  <p class="muted">آخر تحديث: {{ page.updated_at|date:"Y-m-d" }}</p>
</article>
{% endblock %}
