{% if page_obj and page_obj.has_other_pages %}
  <nav class="pagination" aria-label="التنقل بين الصفحات">
    {% if page_obj.has_previous %}
      <a class="button ghost" href="?page={{ page_obj.previous_page_number }}">السابق</a>
    {% endif %}
    <span class="muted">صفحة {{ page_obj.number }} من {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
      <a class="button ghost" href="?page={{ page_obj.next_page_number }}">التالي</a>
    {% endif %}
  </nav>
{% endif %}
